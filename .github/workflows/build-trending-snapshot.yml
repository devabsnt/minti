name: Build trending snapshot

# Refresh the lightweight `/data/monad-trending.json` file used by the
# /explore hero strip. Runs more often than the heavy collections index
# because the trending data needs to be fresh — last 6 hours of activity.
#
# Important: this commits the resulting JSON back to main so the next Pages
# deploy picks it up. Pages then auto-deploys on the workflow_run completion.

on:
  schedule:
    - cron: "15 * * * *" # Hourly at :15
  workflow_dispatch:

permissions:
  contents: write

# Don't pile up runs if a previous one is slow.
concurrency:
  group: build-trending-snapshot
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install script deps
        run: cd scripts && npm install

      - name: Build trending snapshot
        env:
          HYPERSYNC_TOKEN: ${{ secrets.HYPERSYNC_TOKEN }}
        run: node scripts/build-trending-snapshot.mjs

      - name: Commit and push snapshot (with rebase retry)
        run: |
          set -e
          git config user.name "minti-bot"
          git config user.email "minti-bot@users.noreply.github.com"
          if git diff --quiet --exit-code -- frontend/public/data/monad-trending.json; then
            echo "No snapshot changes — skipping commit."
            exit 0
          fi
          git add frontend/public/data/monad-trending.json
          git commit -m "chore: refresh Monad trending snapshot"
          for attempt in 1 2 3 4 5; do
            echo "Push attempt $attempt"
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed — rebasing onto latest origin/main and retrying"
            git fetch origin main
            if ! git rebase -X theirs origin/main; then
              echo "Rebase failed, aborting"
              git rebase --abort
              exit 1
            fi
            sleep $((attempt * 2))
          done
          echo "All push retries exhausted"
          exit 1
