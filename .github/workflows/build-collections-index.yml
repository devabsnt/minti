name: Build collections index

# Refresh the Monad collections snapshot weekly + on demand. Output JSON is
# committed back to the repo so the deployed static site picks it up on the
# next build/deploy. Free tier compute is fine for the ~10-30 min run.

on:
  schedule:
    - cron: "0 6 * * 1-6" # Mon-Sat 06:00 UTC — delta since last run
    - cron: "0 6 * * 0"   # Sun 06:00 UTC — FULL rescan (refreshes top1/top10 holder %)
  workflow_dispatch:
    inputs:
      force_full_rescan:
        description: "Ignore previous snapshot and rebuild from block 0."
        required: false
        type: boolean
        default: false
      backfill_metadata:
        description: "Re-precheck metadata for every previously-known collection that doesn't yet have metadataChecked=true. Use once after the precheck feature ships, then leave unchecked."
        required: false
        type: boolean
        default: false
      max_blocks:
        description: "Cap on blocks scanned (debug). Leave empty for full chain."
        required: false
        type: string
      enrich_limit:
        description: "Cap on contracts enriched (debug)."
        required: false
        type: string

permissions:
  contents: write # to commit the snapshot back

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240 # full sweep can be long; manual cap stays safe
    steps:
      - uses: actions/checkout@v4
        with:
          # Need enough history for the post-build rebase to find a merge
          # base when concurrent commits land on main during our 90-min run.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install script deps
        run: cd scripts && npm install

      - name: Build collections snapshot
        env:
          HYPERSYNC_TOKEN: ${{ secrets.HYPERSYNC_TOKEN }}
          MAX_BLOCKS: ${{ inputs.max_blocks }}
          ENRICH_LIMIT: ${{ inputs.enrich_limit }}
          # FULL rescan if (a) user requested it via dispatch, OR
          # (b) this is the Sunday cron — needed to refresh top1/top10
          # holder concentration which isn't tracked incrementally.
          FORCE_FULL_RESCAN: ${{ (inputs.force_full_rescan || github.event.schedule == '0 6 * * 0') && '1' || '' }}
          # Backfill metadata: re-precheck previously-known collections
          # whose tokenURI was never resolved server-side. One-shot — set
          # the input to true the first time the precheck feature ships,
          # then leave it off for normal runs.
          BACKFILL_METADATA: ${{ inputs.backfill_metadata && '1' || '' }}
          # Marketplace address — falls through to "not deployed" if unset.
          # Once MintiMarketplace is deployed on Monad, set this secret to
          # the deployed address and ItemSold events start populating
          # sales24h/7d, uniqueBuyers, volume.
          MARKETPLACE_ADDRESS: ${{ secrets.MARKETPLACE_ADDRESS }}
          # Lift Node's default heap limit (1.5GB) to 7GB. The full rescan
          # touches ~36k contracts and even with the two-pass balance
          # computation we want headroom for V8's intermediate allocations.
          NODE_OPTIONS: "--max-old-space-size=7168"
        run: node scripts/build-collections-index.mjs

      - name: Commit and push snapshot (with rebase retry)
        # Manual commit+push so we can retry on push race. The 90-min build
        # often overlaps with the hourly trending cron — the off-the-shelf
        # auto-commit action doesn't pull-rebase before push, so a concurrent
        # commit eats this run's output. Loop up to 5 times with rebase
        # between attempts.
        run: |
          set -e
          git config user.name "minti-bot"
          git config user.email "minti-bot@users.noreply.github.com"
          if git diff --quiet --exit-code -- frontend/public/data/monad-collections.json; then
            echo "No snapshot changes — skipping commit."
            exit 0
          fi
          git add frontend/public/data/monad-collections.json
          git commit -m "chore: refresh Monad collections snapshot"
          for attempt in 1 2 3 4 5; do
            echo "Push attempt $attempt"
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed — rebasing onto latest origin/main and retrying"
            git fetch origin main
            # Rebase our snapshot commit onto whatever moved on origin. Our
            # change only touches the snapshot JSON so conflicts are rare;
            # `-X theirs` here means "our rebasing commits win" on conflict
            # (git's rebase terminology is inverted vs merge).
            if ! git rebase -X theirs origin/main; then
              echo "Rebase failed, aborting"
              git rebase --abort
              exit 1
            fi
            sleep $((attempt * 2))
          done
          echo "All push retries exhausted"
          exit 1
