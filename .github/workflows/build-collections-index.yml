name: Build collections index

# Refresh the Monad collections snapshot weekly + on demand. Output JSON is
# committed back to the repo so the deployed static site picks it up on the
# next build/deploy. Free tier compute is fine for the ~10-30 min run.

on:
  schedule:
    - cron: "0 6 * * *" # Daily 06:00 UTC — only the delta since last run
  workflow_dispatch:
    inputs:
      force_full_rescan:
        description: "Ignore previous snapshot and rebuild from block 0."
        required: false
        type: boolean
        default: false
      max_blocks:
        description: "Cap on blocks scanned (debug). Leave empty for full chain."
        required: false
        type: string
      enrich_limit:
        description: "Cap on contracts enriched (debug)."
        required: false
        type: string

permissions:
  contents: write # to commit the snapshot back

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240 # full sweep can be long; manual cap stays safe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install script deps
        run: cd scripts && npm install

      - name: Build collections snapshot
        env:
          HYPERSYNC_TOKEN: ${{ secrets.HYPERSYNC_TOKEN }}
          MAX_BLOCKS: ${{ inputs.max_blocks }}
          ENRICH_LIMIT: ${{ inputs.enrich_limit }}
          FORCE_FULL_RESCAN: ${{ inputs.force_full_rescan && '1' || '' }}
        run: node scripts/build-collections-index.mjs

      - name: Commit snapshot if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh Monad collections snapshot"
          file_pattern: frontend/public/data/monad-collections.json
          commit_user_name: minti-bot
          commit_user_email: minti-bot@users.noreply.github.com
